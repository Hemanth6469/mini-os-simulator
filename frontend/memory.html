<!DOCTYPE html>
<html>

<head>

    <title>Memory Management</title>

    <style>

    body{

        background:#0f0f0f;

        color:white;

        font-family:Arial;

        text-align:center;
    }

    h1{

        margin-top:40px;

        font-size:55px;
    }

    .container{

        margin-top:60px;

        display:flex;

        justify-content:center;

        gap:40px;

        flex-wrap:wrap;
    }

    .card{

        width:300px;

        padding:40px;

        background:#1c1c1c;

        border-radius:20px;

        transition:0.4s;

        cursor:pointer;

        box-shadow:0px 0px 20px rgba(255,255,255,0.08);

        animation:fadeUp 1s ease;
    }

    .card:hover{

        transform:translateY(-10px) scale(1.05);

        box-shadow:0px 0px 30px rgba(255,255,255,0.2);
    }

    a{

        color:white;

        text-decoration:none;

        font-size:30px;

        font-weight:bold;
    }

    button{

        margin-top:70px;

        padding:18px 35px;

        font-size:22px;

        border:none;

        border-radius:12px;

        cursor:pointer;

        transition:0.4s;
    }

    button:hover{

        transform:scale(1.08);

        box-shadow:0px 0px 25px rgba(255,255,255,0.25);
    }

    @keyframes fadeUp{

        from{

            opacity:0;

            transform:translateY(40px);
        }

        to{

            opacity:1;

            transform:translateY(0);
        }
    }

    </style>

</head>

<body>

<h1>Memory Management</h1>

<div class="container">

    <div class="card">

        <a href="firstfit.html">

            First Fit

        </a>

    </div>

    <div class="card">

        <a href="bestfit.html">

            Best Fit

        </a>

    </div>

    <div class="card">

        <a href="worstfit.html">

            Worst Fit

        </a>

    </div>

</div>

<button onclick="window.location.href='index.html'">

    Back

</button>

</body>
</html>
