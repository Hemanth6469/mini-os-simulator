<!DOCTYPE html>
<html>

<head>

<title>FCFS Result</title>

<style>

body{
    background:#0f0f0f;
    color:white;
    font-family:Arial;
    text-align:center;
    padding:20px;
}

table{
    width:100%;
    margin-top:40px;
    border-collapse:collapse;
}

th,td{
    border:1px solid #444;
    padding:15px;
}

th{
    background:#333;
}

.gantt{
    display:flex;
    justify-content:center;
    gap:20px;
    flex-wrap:wrap;
    margin-top:40px;
}

.box{
    background:#222;
    padding:25px;
    border-radius:15px;
    min-width:120px;
}

.cards{
    display:flex;
    justify-content:center;
    gap:20px;
    flex-wrap:wrap;
    margin-top:40px;
}

.card{
    background:#222;
    padding:25px;
    border-radius:15px;
    min-width:250px;
}

button{
    margin-top:40px;
    padding:15px 30px;
    border:none;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
}

</style>

</head>

<body>

<h1>FCFS Result</h1>

<div id="result"></div>

<script>

let at = JSON.parse(localStorage.getItem("fcfs_at"));
let bt = JSON.parse(localStorage.getItem("fcfs_bt"));
let wt = JSON.parse(localStorage.getItem("fcfs_wt"));
let tat = JSON.parse(localStorage.getItem("fcfs_tat"));

let n = bt.length;

let avgWT = 0;
let avgTAT = 0;

let table = `

<table>

<tr>

<th>Process</th>
<th>AT</th>
<th>BT</th>
<th>WT</th>
<th>TAT</th>

</tr>
`;

for(let i=0;i<n;i++){

    avgWT += wt[i];
    avgTAT += tat[i];

    table += `

    <tr>

    <td>P${i+1}</td>
    <td>${at[i]}</td>
    <td>${bt[i]}</td>
    <td>${wt[i]}</td>
    <td>${tat[i]}</td>

    </tr>
    `;
}

table += `</table>`;

avgWT /= n;
avgTAT /= n;

let gantt = `<div class="gantt">`;

let current = 0;

for(let i=0;i<n;i++){

    let end = current + bt[i];

    gantt += `

    <div class="box">

    <h3>P${i+1}</h3>

    <p>${current} - ${end}</p>

    </div>
    `;

    current = end;
}

gantt += `</div>`;

document.getElementById("result").innerHTML = `

<div class="cards">

<div class="card">

<h2>Average WT</h2>

<h1>${avgWT.toFixed(2)}</h1>

</div>

<div class="card">

<h2>Average TAT</h2>

<h1>${avgTAT.toFixed(2)}</h1>

</div>

</div>

${table}

<h1>Gantt Chart</h1>

${gantt}

<button onclick="window.location.href='fcfs.html'">

Back

</button>
`;

</script>

</body>

</html>
