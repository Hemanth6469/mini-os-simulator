<!DOCTYPE html>
<html>

<head>

<title>First Fit</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
    background:#0f0f0f;
    color:white;
    font-family:Arial;
    text-align:center;
    padding:20px;
}

.card{
    background:#1c1c1c;
    width:95%;
    max-width:900px;
    margin:auto;
    padding:30px;
    border-radius:20px;
}

input{
    width:90%;
    padding:15px;
    margin-top:15px;
    border:none;
    border-radius:10px;
}

button{
    padding:15px 30px;
    margin-top:20px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

table{
    width:100%;
    margin-top:30px;
    border-collapse:collapse;
}

th,td{
    border:1px solid #444;
    padding:15px;
}

</style>

</head>

<body>

<h1>First Fit Memory Management</h1>

<div class="card">

<input type="number" id="blocks" placeholder="Number of Blocks">

<input type="number" id="processes" placeholder="Number of Processes">

<button onclick="generateInputs()">

Generate Inputs

</button>

<form action="/run_firstfit" method="POST">

<div id="inputs"></div>

</form>

<button onclick="history.back()">

Back

</button>

</div>

<script>

function generateInputs(){

    let b = document.getElementById("blocks").value;
    let p = document.getElementById("processes").value;

    let html = `

    <input type="hidden" name="blocks" value="${b}">
    <input type="hidden" name="processes" value="${p}">

    <table>

    <tr>
        <th>Block Sizes</th>
    </tr>
    `;

    for(let i=0;i<b;i++){

        html += `
        <tr>
            <td>
                <input type="number" name="block${i}" required>
            </td>
        </tr>
        `;
    }

    html += `
    </table>

    <table>

    <tr>
        <th>Process Sizes</th>
    </tr>
    `;

    for(let i=0;i<p;i++){

        html += `
        <tr>
            <td>
                <input type="number" name="process${i}" required>
            </td>
        </tr>
        `;
    }

    html += `
    </table>

    <button type="submit">

    Run First Fit

    </button>
    `;

    document.getElementById("inputs").innerHTML = html;
}

</script>

</body>
</html>
