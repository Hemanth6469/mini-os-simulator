<!DOCTYPE html>
<html>

<head>

    <title>FCFS Scheduling</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>

        body{
            background:#0f0f0f;
            color:white;
            font-family:Arial;
            text-align:center;
            padding:20px;
        }

        h1{
            font-size:55px;
        }

        .container{
            background:#1c1c1c;
            width:85%;
            margin:auto;
            padding:40px;
            border-radius:20px;
            margin-top:30px;
        }

        input{
            padding:15px;
            width:80%;
            border:none;
            border-radius:10px;
            margin-top:10px;
            font-size:18px;
        }

        button{
            margin-top:20px;
            padding:15px 30px;
            border:none;
            border-radius:10px;
            font-size:18px;
            cursor:pointer;
        }

        table{
            width:100%;
            margin-top:30px;
            border-collapse:collapse;
        }

        th,td{
            border:1px solid #444;
            padding:15px;
        }

        th{
            background:#333;
        }

        .gantt{
            display:flex;
            justify-content:center;
            gap:20px;
            flex-wrap:wrap;
            margin-top:40px;
        }

        .box{
            background:#222;
            padding:25px;
            border-radius:15px;
            min-width:120px;
        }

        .cards{
            display:flex;
            justify-content:center;
            gap:20px;
            flex-wrap:wrap;
            margin-top:40px;
        }

        .card{
            background:#222;
            padding:25px;
            border-radius:15px;
            min-width:250px;
        }

        @media(max-width:768px){

            h1{
                font-size:35px;
            }

            .container{
                width:95%;
                padding:20px;
            }

            input{
                width:90%;
            }
        }

    </style>

</head>

<body>

<h1>FCFS Scheduling</h1>

<div class="container">

    <h2>Enter Number of Processes</h2>

    <input type="number" id="n" value="3">

    <br>

    <button onclick="generateInputs()">

        Generate Inputs

    </button>

    <div id="inputs"></div>

    <br>

    <button onclick="window.location.href='cpu.html'">

        Back

    </button>

</div>

<script>

function generateInputs(){

    let n = document.getElementById("n").value;

    let html = `

    <table>

        <tr>

            <th>Process</th>
            <th>Arrival Time</th>
            <th>Burst Time</th>

        </tr>
    `;

    for(let i=0;i<n;i++){

        html += `

        <tr>

            <td>P${i+1}</td>

            <td>

                <input type="number" id="at${i}" value="${i}">

            </td>

            <td>

                <input type="number" id="bt${i}" value="${i+2}">

            </td>

        </tr>
        `;
    }

    html += `

    </table>

    <button onclick="runFCFS()">

        Run FCFS

    </button>
    `;

    document.getElementById("inputs").innerHTML = html;
}

function runFCFS(){

    let n = parseInt(document.getElementById("n").value);

    let at = [];
    let bt = [];

    for(let i=0;i<n;i++){

        at.push(parseInt(document.getElementById(`at${i}`).value));

        bt.push(parseInt(document.getElementById(`bt${i}`).value));
    }

    let wt = Array(n).fill(0);

    let tat = Array(n).fill(0);

    for(let i=1;i<n;i++){

        wt[i] = wt[i-1] + bt[i-1];
    }

    for(let i=0;i<n;i++){

        tat[i] = wt[i] + bt[i];
    }

    localStorage.setItem("fcfs_at", JSON.stringify(at));
    localStorage.setItem("fcfs_bt", JSON.stringify(bt));
    localStorage.setItem("fcfs_wt", JSON.stringify(wt));
    localStorage.setItem("fcfs_tat", JSON.stringify(tat));

    window.location.href = "fcfs_result.html";
}

</script>

</body>

</html>
