<!DOCTYPE html>
<html>

<head>

<title>Priority Scheduling</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
    background:#0f0f0f;
    color:white;
    font-family:Arial;
    text-align:center;
    padding:20px;
}

.container{
    background:#1c1c1c;
    width:85%;
    margin:auto;
    padding:40px;
    border-radius:20px;
}

input{
    padding:15px;
    width:80%;
    border:none;
    border-radius:10px;
    margin-top:10px;
}

button{
    margin-top:20px;
    padding:15px 30px;
    border:none;
    border-radius:10px;
    font-size:18px;
}

table{
    width:100%;
    margin-top:30px;
    border-collapse:collapse;
}

th,td{
    border:1px solid #444;
    padding:15px;
}

th{
    background:#333;
}

</style>

</head>

<body>

<h1>Priority Scheduling</h1>

<div class="container">

<input type="number" id="n" value="3">

<br>

<button onclick="generateInputs()">

Generate Inputs

</button>

<div id="inputs"></div>

<br>

<button onclick="window.location.href='cpu.html'">

Back

</button>

</div>

<script>

function generateInputs(){

    let n = document.getElementById("n").value;

    let html = `

    <table>

    <tr>

    <th>Process</th>
    <th>AT</th>
    <th>BT</th>
    <th>Priority</th>

    </tr>
    `;

    for(let i=0;i<n;i++){

        html += `

        <tr>

        <td>P${i+1}</td>

        <td>

        <input type="number" id="at${i}" value="${i}">

        </td>

        <td>

        <input type="number" id="bt${i}" value="${i+2}">

        </td>

        <td>

        <input type="number" id="pr${i}" value="${i+1}">

        </td>

        </tr>
        `;
    }

    html += `

    </table>

    <button onclick="runPriority()">

    Run Priority

    </button>
    `;

    document.getElementById("inputs").innerHTML = html;
}

function runPriority(){

    let n = parseInt(document.getElementById("n").value);

    let processes = [];

    for(let i=0;i<n;i++){

        processes.push({

            pid:i+1,

            at:parseInt(document.getElementById(`at${i}`).value),

            bt:parseInt(document.getElementById(`bt${i}`).value),

            pr:parseInt(document.getElementById(`pr${i}`).value)
        });
    }

    processes.sort((a,b)=>a.pr-b.pr);

    let wt = [];
    let tat = [];

    wt[0] = 0;

    for(let i=1;i<n;i++){

        wt[i] = wt[i-1] + processes[i-1].bt;
    }

    for(let i=0;i<n;i++){

        tat[i] = wt[i] + processes[i].bt;
    }

    localStorage.setItem("priority_processes", JSON.stringify(processes));
    localStorage.setItem("priority_wt", JSON.stringify(wt));
    localStorage.setItem("priority_tat", JSON.stringify(tat));

    window.location.href = "priority_result.html";
}

</script>

</body>

</html>
