<!DOCTYPE html>
<html>

<head>

<title>Round Robin Scheduling</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0f0f0f;
    color:white;
    font-family:Arial;
    text-align:center;
    padding:20px;
}

h1{
    margin-top:20px;
    font-size:55px;
}

.card{
    background:#1c1c1c;
    width:95%;
    max-width:900px;
    margin:auto;
    margin-top:40px;
    padding:40px 25px;
    border-radius:20px;
    box-shadow:0px 0px 20px rgba(255,255,255,0.08);
}

input{
    width:90%;
    padding:15px;
    margin-top:15px;
    font-size:18px;
    border:none;
    border-radius:10px;
    outline:none;
}

button{
    padding:15px 30px;
    margin-top:25px;
    border:none;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
}

table{
    width:100%;
    margin-top:35px;
    border-collapse:collapse;
}

th,td{
    border:1px solid #444;
    padding:15px;
}

th{
    background:#333;
}

@media(max-width:768px){

    h1{
        font-size:35px;
    }

    input{
        width:100%;
        font-size:16px;
    }

    button{
        width:100%;
        font-size:16px;
    }

    table{
        font-size:14px;
    }
}

</style>

</head>

<body>

<h1>Round Robin Scheduling</h1>

<div class="card">

<input
type="number"
id="num"
placeholder="Enter Number of Processes">

<input
type="number"
id="tq"
placeholder="Enter Time Quantum">

<button onclick="generateInputs()">

Generate Inputs

</button>

<form
action="/run_rr"
method="POST">

<div id="inputs"></div>

</form>

<button onclick="history.back()">

Back

</button>

</div>

<script>

function generateInputs(){

    let n = document.getElementById("num").value;

    let tq = document.getElementById("tq").value;

    let html = `

    <input
    type="hidden"
    name="n"
    value="${n}">

    <input
    type="hidden"
    name="tq"
    value="${tq}">

    <table>

    <tr>
        <th>Process</th>
        <th>Arrival Time</th>
        <th>Burst Time</th>
    </tr>
    `;

    for(let i=0;i<n;i++){

        html += `

        <tr>

            <td>P${i+1}</td>

            <td>
                <input
                type="number"
                name="at${i}"
                required>
            </td>

            <td>
                <input
                type="number"
                name="bt${i}"
                required>
            </td>

        </tr>
        `;
    }

    html += `

    </table>

    <button type="submit">

    Run Round Robin

    </button>
    `;

    document.getElementById("inputs").innerHTML = html;
}

</script>

</body>
</html>
