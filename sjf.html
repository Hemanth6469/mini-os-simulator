<!DOCTYPE html>
<html>

<head>

    <title>SJF Scheduling</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>

        body{
            background:#0f0f0f;
            color:white;
            font-family:Arial;
            text-align:center;
            padding:20px;
        }

        h1{
            font-size:55px;
        }

        .container{
            background:#1c1c1c;
            width:85%;
            margin:auto;
            padding:40px;
            border-radius:20px;
            margin-top:30px;
        }

        input{
            padding:15px;
            width:80%;
            border:none;
            border-radius:10px;
            margin-top:10px;
            font-size:18px;
        }

        button{
            margin-top:20px;
            padding:15px 30px;
            border:none;
            border-radius:10px;
            font-size:18px;
            cursor:pointer;
        }

        table{
            width:100%;
            margin-top:30px;
            border-collapse:collapse;
        }

        th,td{
            border:1px solid #444;
            padding:15px;
        }

        th{
            background:#333;
        }

        @media(max-width:768px){

            h1{
                font-size:35px;
            }

            .container{
                width:95%;
                padding:20px;
            }

            input{
                width:90%;
            }
        }

    </style>

</head>

<body>

<h1>SJF Scheduling</h1>

<div class="container">

    <h2>Enter Number of Processes</h2>

    <input type="number" id="n" value="3">

    <br>

    <button onclick="generateInputs()">

        Generate Inputs

    </button>

    <div id="inputs"></div>

    <br>

    <button onclick="window.location.href='cpu.html'">

        Back

    </button>

</div>

<script>

function generateInputs(){

    let n = document.getElementById("n").value;

    let html = `

    <table>

        <tr>

            <th>Process</th>
            <th>Arrival Time</th>
            <th>Burst Time</th>

        </tr>
    `;

    for(let i=0;i<n;i++){

        html += `

        <tr>

            <td>P${i+1}</td>

            <td>

                <input type="number" id="at${i}" value="${i}">

            </td>

            <td>

                <input type="number" id="bt${i}" value="${i+2}">

            </td>

        </tr>
        `;
    }

    html += `

    </table>

    <button onclick="runSJF()">

        Run SJF

    </button>
    `;

    document.getElementById("inputs").innerHTML = html;
}

function runSJF(){

    let n = parseInt(document.getElementById("n").value);

    let processes = [];

    for(let i=0;i<n;i++){

        let at = parseInt(document.getElementById(`at${i}`).value);

        let bt = parseInt(document.getElementById(`bt${i}`).value);

        processes.push({
            pid:i+1,
            at:at,
            bt:bt
        });
    }

    processes.sort((a,b)=>a.bt-b.bt);

    let wt = [];
    let tat = [];

    wt[0] = 0;

    for(let i=1;i<n;i++){

        wt[i] = wt[i-1] + processes[i-1].bt;
    }

    for(let i=0;i<n;i++){

        tat[i] = wt[i] + processes[i].bt;
    }

    localStorage.setItem("sjf_processes", JSON.stringify(processes));
    localStorage.setItem("sjf_wt", JSON.stringify(wt));
    localStorage.setItem("sjf_tat", JSON.stringify(tat));

    window.location.href = "sjf_result.html";
}

</script>

</body>

</html>
