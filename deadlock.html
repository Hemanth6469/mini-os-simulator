<!DOCTYPE html>
<html>

<head>

<title>Deadlock Detection</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
    background:#0f0f0f;
    color:white;
    font-family:Arial;
    text-align:center;
    padding:20px;
}

h1{
    font-size:55px;
}

.container{
    background:#1c1c1c;
    width:90%;
    margin:auto;
    padding:40px;
    border-radius:20px;
}

input{
    padding:15px;
    width:80%;
    border:none;
    border-radius:10px;
    margin-top:10px;
    font-size:18px;
}

button{
    margin-top:20px;
    padding:15px 30px;
    border:none;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
}

table{
    width:100%;
    margin-top:30px;
    border-collapse:collapse;
}

th,td{
    border:1px solid #444;
    padding:15px;
}

th{
    background:#333;
}

@media(max-width:768px){

    h1{
        font-size:35px;
    }

    .container{
        width:95%;
        padding:20px;
    }

    input{
        width:90%;
    }
}

</style>

</head>

<body>

<h1>Deadlock Detection</h1>

<div class="container">

<h2>Number of Processes</h2>

<input type="number" id="n" value="5">

<h2>Number of Resources</h2>

<input type="number" id="r" value="3">

<br>

<button onclick="generateInputs()">

Generate Inputs

</button>

<div id="inputs"></div>

<br>

<button onclick="window.location.href='index.html'">

Back

</button>

</div>

<script>

function generateInputs(){

    let n = parseInt(document.getElementById("n").value);

    let r = parseInt(document.getElementById("r").value);

    let html = "";

    html += `

    <h2>Allocation Matrix</h2>

    <table>

    <tr>

    <th>Process</th>
    <th>Allocation</th>

    </tr>
    `;

    for(let i=0;i<n;i++){

        html += `

        <tr>

        <td>P${i}</td>

        <td>

        <input type="text" id="alloc${i}" placeholder="Example: 0 1 0">

        </td>

        </tr>
        `;
    }

    html += `</table>`;

    html += `

    <h2>Maximum Matrix</h2>

    <table>

    <tr>

    <th>Process</th>
    <th>Maximum</th>

    </tr>
    `;

    for(let i=0;i<n;i++){

        html += `

        <tr>

        <td>P${i}</td>

        <td>

        <input type="text" id="max${i}" placeholder="Example: 7 5 3">

        </td>

        </tr>
        `;
    }

    html += `</table>`;

    html += `

    <h2>Available Resources</h2>

    <input type="text" id="available" placeholder="Example: 3 3 2">

    <br>

    <button onclick="runDeadlock()">

    Run Deadlock Detection

    </button>
    `;

    document.getElementById("inputs").innerHTML = html;
}

function runDeadlock(){

    let n = parseInt(document.getElementById("n").value);

    let r = parseInt(document.getElementById("r").value);

    let allocation = [];
    let maximum = [];

    for(let i=0;i<n;i++){

        allocation.push(
            document.getElementById(`alloc${i}`)
            .value
            .split(" ")
            .map(Number)
        );

        maximum.push(
            document.getElementById(`max${i}`)
            .value
            .split(" ")
            .map(Number)
        );
    }

    let available = document
    .getElementById("available")
    .value
    .split(" ")
    .map(Number);

    let need = [];

    for(let i=0;i<n;i++){

        let row = [];

        for(let j=0;j<r;j++){

            row.push(
                maximum[i][j] - allocation[i][j]
            );
        }

        need.push(row);
    }

    let finish = Array(n).fill(false);

    let safe = [];

    let work = [...available];

    while(true){

        let found = false;

        for(let i=0;i<n;i++){

            if(!finish[i]){

                let possible = true;

                for(let j=0;j<r;j++){

                    if(need[i][j] > work[j]){

                        possible = false;
                        break;
                    }
                }

                if(possible){

                    for(let j=0;j<r;j++){

                        work[j] += allocation[i][j];
                    }

                    safe.push(`P${i}`);

                    finish[i] = true;

                    found = true;
                }
            }
        }

        if(!found)
            break;
    }

    let deadlock = false;

    for(let i=0;i<n;i++){

        if(!finish[i]){

            deadlock = true;
        }
    }

    localStorage.setItem(
        "deadlock_allocation",
        JSON.stringify(allocation)
    );

    localStorage.setItem(
        "deadlock_maximum",
        JSON.stringify(maximum)
    );

    localStorage.setItem(
        "deadlock_need",
        JSON.stringify(need)
    );

    localStorage.setItem(
        "deadlock_safe",
        JSON.stringify(safe)
    );

    localStorage.setItem(
        "deadlock_status",
        deadlock ? "Deadlock Detected ❌" : "Safe State ✅"
    );

    window.location.href = "deadlock_result.html";
}

</script>

</body>

</html>
