<!DOCTYPE html>
<html>

<head>

    <title>Mini Operating System Simulator</title>

    <link rel="stylesheet" href="css/style.css">

    <style>

    body{

        background:#0f0f0f;

        color:white;

        font-family:Arial;

        text-align:center;

        margin:0;

        padding:0;
    }

    h1{

        margin-top:20px;

        font-size:60px;
    }

    .container{

        margin-top:50px;

        display:grid;

        grid-template-columns:repeat(2, 1fr);

        gap:50px;

        width:90%;

        margin-left:auto;

        margin-right:auto;
    }

    .card{

        background:#1c1c1c;

        padding:60px;

        border-radius:25px;

        box-shadow:0px 0px 20px rgba(255,255,255,0.08);

        transition:0.4s;

        animation:fadeUp 1s ease;
    }

    .card:hover{

        transform:translateY(-10px) scale(1.03);

        box-shadow:0px 0px 35px rgba(255,255,255,0.2);
    }

    h2{

        font-size:28px;

        margin-bottom:30px;
    }

    button{

        padding:18px 35px;

        font-size:22px;

        border:none;

        border-radius:12px;

        cursor:pointer;

        transition:0.4s;
    }

    button:hover{

        transform:scale(1.08);

        box-shadow:0px 0px 25px rgba(255,255,255,0.25);
    }

    @keyframes fadeUp{

        from{

            opacity:0;

            transform:translateY(40px);
        }

        to{

            opacity:1;

            transform:translateY(0);
        }
    }

    </style>

</head>

<body>

<h1>Mini Operating System Simulator</h1>

<div class="container">

    <!-- CPU Scheduling -->

    <div class="card">

        <h2>CPU Scheduling</h2>

        <button onclick="window.location.href='cpu.html'">

            Open

        </button>

    </div>

    <!-- Memory Management -->

    <div class="card">

        <h2>Memory Management</h2>

        <button onclick="window.location.href='memory.html'">

            Open

        </button>

    </div>

    <!-- Deadlock Detection -->

    <div class="card">

        <h2>Deadlock Detection</h2>

        <button onclick="window.location.href='deadlock.html'">

            Open

        </button>

    </div>

    <!-- Disk Scheduling -->

    <div class="card">

        <h2>Disk Scheduling</h2>

        <button onclick="window.location.href='disk.html'">

            Open

        </button>

    </div>

</div>

</body>
</html>
