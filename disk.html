<!DOCTYPE html>
<html>

<head>

<title>Disk Scheduling</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
    background:#0f0f0f;
    color:white;
    font-family:Arial;
    text-align:center;
    padding:20px;
}

h1{
    font-size:55px;
}

.container{
    width:90%;
    margin:auto;

    display:grid;
    grid-template-columns:repeat(2,1fr);

    gap:40px;

    margin-top:50px;
}

.card{
    background:#1c1c1c;
    padding:50px;
    border-radius:25px;

    transition:0.4s;

    box-shadow:0px 0px 20px rgba(255,255,255,0.08);
}

.card:hover{
    transform:translateY(-10px) scale(1.03);

    box-shadow:0px 0px 35px rgba(255,255,255,0.2);
}

button{
    padding:15px 30px;
    border:none;
    border-radius:10px;
    font-size:20px;
    cursor:pointer;
}

.back{
    margin-top:50px;
}

@media(max-width:768px){

    h1{
        font-size:35px;
    }

    .container{
        grid-template-columns:1fr;
    }
}

</style>

</head>

<body>

<h1>Disk Scheduling</h1>

<div class="container">

    <div class="card">

        <h2>FCFS Disk</h2>

        <button onclick="window.location.href='disk_fcfs.html'">

            Open

        </button>

    </div>

    <div class="card">

        <h2>SSTF Disk</h2>

        <button onclick="window.location.href='disk_sstf.html'">

            Open

        </button>

    </div>

    <div class="card">

        <h2>SCAN Disk</h2>

        <button onclick="window.location.href='disk_scan.html'">

            Open

        </button>

    </div>

    <div class="card">

        <h2>C-SCAN Disk</h2>

        <button onclick="window.location.href='disk_cscan.html'">

            Open

        </button>

    </div>

</div>

<div class="back">

<button onclick="window.location.href='index.html'">

Back

</button>

</div>

</body>

</html>
