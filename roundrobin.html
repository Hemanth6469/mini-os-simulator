<!DOCTYPE html>
<html>

<head>

    <title>Round Robin Scheduling</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>

        body{
            background:#0f0f0f;
            color:white;
            font-family:Arial;
            text-align:center;
            padding:20px;
        }

        h1{
            font-size:55px;
        }

        .container{
            background:#1c1c1c;
            width:85%;
            margin:auto;
            padding:40px;
            border-radius:20px;
            margin-top:30px;
        }

        input{
            padding:15px;
            width:80%;
            border:none;
            border-radius:10px;
            margin-top:10px;
            font-size:18px;
        }

        button{
            margin-top:20px;
            padding:15px 30px;
            border:none;
            border-radius:10px;
            font-size:18px;
            cursor:pointer;
        }

        table{
            width:100%;
            margin-top:30px;
            border-collapse:collapse;
        }

        th,td{
            border:1px solid #444;
            padding:15px;
        }

        th{
            background:#333;
        }

    </style>

</head>

<body>

<h1>Round Robin Scheduling</h1>

<div class="container">

    <h2>Enter Number of Processes</h2>

    <input type="number" id="n" value="3">

    <br>

    <h2>Time Quantum</h2>

    <input type="number" id="tq" value="2">

    <br>

    <button onclick="generateInputs()">

        Generate Inputs

    </button>

    <div id="inputs"></div>

    <br>

    <button onclick="window.location.href='cpu.html'">

        Back

    </button>

</div>

<script>

function generateInputs(){

    let n = document.getElementById("n").value;

    let html = `

    <table>

        <tr>

            <th>Process</th>
            <th>Arrival Time</th>
            <th>Burst Time</th>

        </tr>
    `;

    for(let i=0;i<n;i++){

        html += `

        <tr>

            <td>P${i+1}</td>

            <td>

                <input type="number" id="at${i}" value="${i}">

            </td>

            <td>

                <input type="number" id="bt${i}" value="${i+3}">

            </td>

        </tr>
        `;
    }

    html += `

    </table>

    <button onclick="runRR()">

        Run Round Robin

    </button>
    `;

    document.getElementById("inputs").innerHTML = html;
}

function runRR(){

    let n = parseInt(document.getElementById("n").value);

    let tq = parseInt(document.getElementById("tq").value);

    let at = [];
    let bt = [];

    for(let i=0;i<n;i++){

        at.push(parseInt(document.getElementById(`at${i}`).value));

        bt.push(parseInt(document.getElementById(`bt${i}`).value));
    }

    let rem = [...bt];

    let wt = Array(n).fill(0);

    let tat = Array(n).fill(0);

    let t = 0;

    while(true){

        let done = true;

        for(let i=0;i<n;i++){

            if(rem[i] > 0){

                done = false;

                if(rem[i] > tq){

                    t += tq;

                    rem[i] -= tq;

                }

                else{

                    t += rem[i];

                    wt[i] = t - bt[i];

                    rem[i] = 0;
                }
            }
        }

        if(done)
            break;
    }

    for(let i=0;i<n;i++){

        tat[i] = wt[i] + bt[i];
    }

    localStorage.setItem("rr_at", JSON.stringify(at));
    localStorage.setItem("rr_bt", JSON.stringify(bt));
    localStorage.setItem("rr_wt", JSON.stringify(wt));
    localStorage.setItem("rr_tat", JSON.stringify(tat));

    window.location.href = "roundrobin_result.html";
}

</script>

</body>

</html>
