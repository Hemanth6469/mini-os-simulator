<!DOCTYPE html>
<html>

<head>

    <title>Worst Fit</title>

    <style>

    body{
        background:#0f0f0f;
        color:white;
        font-family:Arial;
        text-align:center;
    }

    h1{
        margin-top:30px;
        font-size:55px;
    }

    .card{

        background:#1c1c1c;

        width:500px;

        margin:auto;

        margin-top:40px;

        padding:40px;

        border-radius:20px;

        box-shadow:0px 0px 20px rgba(255,255,255,0.08);
    }

    input{

        width:90%;

        padding:15px;

        margin-top:20px;

        font-size:18px;

        border:none;

        border-radius:10px;
    }

    button{

        margin-top:30px;

        padding:15px 30px;

        font-size:20px;

        border:none;

        border-radius:10px;

        cursor:pointer;
    }

    </style>

</head>

<body>

<h1>Worst Fit Memory Allocation</h1>

<div class="card">

<form
action="http://127.0.0.1:5000/run_worstfit"
method="POST">

    <h2>Memory Blocks</h2>

    <input
    type="text"
    name="blocks"
    placeholder="100 500 200 300 600"
    required>

    <h2>Processes</h2>

    <input
    type="text"
    name="processes"
    placeholder="212 417 112 426"
    required>

    <br>

    <button type="submit">

        Run Worst Fit

    </button>

</form>

<br>

<button onclick="window.location.href='memory.html'">

    Back

</button>

</div>

</body>
</html>
