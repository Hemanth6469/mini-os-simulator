<!DOCTYPE html>
<html>

<head>

    <title>SJF Scheduling</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>

        body{
            background:#0f0f0f;
            color:white;
            font-family:Arial;
            text-align:center;
            padding:20px;
        }

        h1{
            font-size:60px;
        }

        .container{
            background:#1f1f1f;
            padding:40px;
            border-radius:20px;
            width:80%;
            margin:auto;
            margin-top:30px;
        }

        input{
            padding:15px;
            width:80%;
            border:none;
            border-radius:10px;
            margin-top:15px;
            font-size:18px;
        }

        button{
            margin-top:25px;
            padding:15px 30px;
            border:none;
            border-radius:10px;
            font-size:18px;
            cursor:pointer;
        }

        table{
            width:100%;
            margin-top:40px;
            border-collapse:collapse;
        }

        th,td{
            border:1px solid #444;
            padding:15px;
        }

        th{
            background:#333;
        }

        .gantt{
            display:flex;
            justify-content:center;
            gap:20px;
            flex-wrap:wrap;
            margin-top:40px;
        }

        .box{
            background:#222;
            padding:25px;
            border-radius:15px;
            min-width:120px;
        }

        .cards{
            display:flex;
            justify-content:center;
            gap:20px;
            flex-wrap:wrap;
            margin-top:40px;
        }

        .card{
            background:#222;
            padding:25px;
            border-radius:15px;
            min-width:250px;
        }

        @media(max-width:768px){

            h1{
                font-size:35px;
            }

            .container{
                width:95%;
                padding:20px;
            }

            input{
                width:90%;
            }

        }

    </style>

</head>

<body>

    <h1>SJF Scheduling</h1>

    <div class="container">

        <h2>Enter Number of Processes</h2>

        <input type="number" id="n" value="3">

        <br>

        <button onclick="generateInputs()">

            Generate Inputs

        </button>

        <div id="inputs"></div>

    </div>

    <div id="output"></div>

<script>

function generateInputs(){

    let n = document.getElementById("n").value;

    let html = "";

    html += `

    <table>

        <tr>

            <th>Process</th>
            <th>Arrival Time</th>
            <th>Burst Time</th>

        </tr>
    `;

    for(let i=0;i<n;i++){

        html += `

        <tr>

            <td>P${i+1}</td>

            <td>

                <input type="number" id="at${i}" value="${i}">

            </td>

            <td>

                <input type="number" id="bt${i}" value="${i+2}">

            </td>

        </tr>
        `;
    }

    html += `

    </table>

    <button onclick="runSJF()">

        Run SJF

    </button>

    <br>

    <button onclick="window.location.href='cpu.html'">

        Back

    </button>
    `;

    document.getElementById("inputs").innerHTML = html;
}

function runSJF(){

    let n = parseInt(
        document.getElementById("n").value
    );

    let processes = [];

    for(let i=0;i<n;i++){

        let at = parseInt(
            document.getElementById(`at${i}`).value
        );

        let bt = parseInt(
            document.getElementById(`bt${i}`).value
        );

        processes.push({
            pid:i+1,
            at:at,
            bt:bt
        });
    }

    processes.sort((a,b)=>a.bt-b.bt);

    let wt = [];
    let tat = [];

    wt[0] = 0;

    for(let i=1;i<n;i++){

        wt[i] = wt[i-1] + processes[i-1].bt;
    }

    for(let i=0;i<n;i++){

        tat[i] = wt[i] + processes[i].bt;
    }

    let avgWT = 0;
    let avgTAT = 0;

    let table = `

    <table>

        <tr>

            <th>Process</th>
            <th>AT</th>
            <th>BT</th>
            <th>WT</th>
            <th>TAT</th>

        </tr>
    `;

    for(let i=0;i<n;i++){

        avgWT += wt[i];
        avgTAT += tat[i];

        table += `

        <tr>

            <td>P${processes[i].pid}</td>

            <td>${processes[i].at}</td>

            <td>${processes[i].bt}</td>

            <td>${wt[i]}</td>

            <td>${tat[i]}</td>

        </tr>
        `;
    }

    table += `</table>`;

    avgWT /= n;
    avgTAT /= n;

    let gantt = `<div class="gantt">`;

    let current = 0;

    for(let i=0;i<n;i++){

        let end = current + processes[i].bt;

        gantt += `

        <div class="box">

            <h3>P${processes[i].pid}</h3>

            <p>${current} - ${end}</p>

        </div>
        `;

        current = end;
    }

    gantt += `</div>`;

    document.getElementById("output").innerHTML = `

    <div class="cards">

        <div class="card">

            <h2>Average WT</h2>

            <h1>${avgWT.toFixed(2)}</h1>

        </div>

        <div class="card">

            <h2>Average TAT</h2>

            <h1>${avgTAT.toFixed(2)}</h1>

        </div>

    </div>

    <h1>Result Table</h1>

    ${table}

    <h1>Gantt Chart</h1>

    ${gantt}
    `;
}

</script>

</body>

</html>
