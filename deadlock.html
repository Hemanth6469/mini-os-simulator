<!DOCTYPE html>
<html>

<head>

<title>Deadlock Detection</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
    background:#0f0f0f;
    color:white;
    font-family:Arial;
    text-align:center;
    padding:20px;
}

.card{
    background:#1c1c1c;
    width:95%;
    max-width:1000px;
    margin:auto;
    padding:30px;
    border-radius:20px;
}

input{
    width:90%;
    padding:15px;
    margin-top:15px;
    border:none;
    border-radius:10px;
}

textarea{
    width:90%;
    height:60px;
    padding:15px;
    margin-top:15px;
    border:none;
    border-radius:10px;
}

button{
    padding:15px 30px;
    margin-top:20px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

</style>

</head>

<body>

<h1>Deadlock Detection</h1>

<div class="card">

<input
type="number"
id="processes"
placeholder="Number of Processes">

<input
type="number"
id="resources"
placeholder="Number of Resources">

<button onclick="generateInputs()">

Generate Inputs

</button>

<form
action="/run_deadlock"
method="POST">

<div id="inputs"></div>

</form>

<button onclick="history.back()">

Back

</button>

</div>

<script>

function generateInputs(){

    let p = document.getElementById("processes").value;
    let r = document.getElementById("resources").value;

    let html = `

    <input type="hidden" name="processes" value="${p}">
    <input type="hidden" name="resources" value="${r}">
    `;

    html += `<h2>Allocation Matrix</h2>`;

    for(let i=0;i<p;i++){

        html += `
        <textarea
        name="allocation${i}"
        placeholder="Example: 0 1 0"
        required></textarea>
        `;
    }

    html += `<h2>Maximum Matrix</h2>`;

    for(let i=0;i<p;i++){

        html += `
        <textarea
        name="maximum${i}"
        placeholder="Example: 7 5 3"
        required></textarea>
        `;
    }

    html += `

    <h2>Available Resources</h2>

    <textarea
    name="available"
    placeholder="Example: 3 3 2"
    required></textarea>

    <br>

    <button type="submit">

    Run Deadlock Detection

    </button>
    `;

    document.getElementById("inputs").innerHTML = html;
}

</script>

</body>
</html>
